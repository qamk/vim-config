# outline report frontmatter schema

fields:
  status:
    type: "enum"
    values: [shipped, revisiting, monitoring]
    required: true

  variant:
    type: "enum"
    values: [operational, general, technical]
    required: false

  audience:
    type: "list[enum]"
    values: [operational, technical, engineering, leadership, cx]
    required: true
